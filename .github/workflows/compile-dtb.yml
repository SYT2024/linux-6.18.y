name: Compile W132D DTB Only

on:
  workflow_dispatch:

jobs:
  build-dtb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu device-tree-compiler
          echo "=== DTC version ==="
          dtc --version
          echo "=== Cross compiler ==="
          aarch64-linux-gnu-gcc --version | head -1

      - name: Check required files exist
        run: |
          echo "=== DTS file ==="
          ls -la arch/arm64/boot/dts/rockchip/rk3528-w132d.dts || { echo "ERROR: DTS not found!"; exit 1; }
          echo "=== rk3528.dtsi ==="
          ls -la arch/arm64/boot/dts/rockchip/rk3528.dtsi || { echo "ERROR: rk3528.dtsi not found!"; exit 1; }
          echo "=== Makefile check ==="
          grep "rk3528-w132d" arch/arm64/boot/dts/rockchip/Makefile || echo "OK: not in Makefile (manual compile)"

      - name: Preprocess DTS
        run: |
          echo "=== Running cpp preprocessor ==="
          aarch64-linux-gnu-gcc -E -P -x assembler-with-cpp \
            -nostdinc \
            -I arch/arm64/boot/dts/rockchip \
            -I include \
            -undef \
            -o rk3528-w132d.preprocessed.dts \
            arch/arm64/boot/dts/rockchip/rk3528-w132d.dts 2>&1 | head -50
          echo "=== Exit code: $? ==="
          echo "=== Preprocessed DTS lines: $(wc -l < rk3528-w132d.preprocessed.dts) ==="
          echo "=== First 5 lines of preprocessed DTS ==="
          head -5 rk3528-w132d.preprocessed.dts

      - name: Compile DTB
        run: |
          echo "=== Running dtc ==="
          dtc -I dts -O dtb -o rk3528-w132d.dtb rk3528-w132d.preprocessed.dts 2>&1
          echo "=== Exit code: $? ==="
          ls -la rk3528-w132d.dtb || echo "DTB not created"

      - name: Upload DTB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rk3528-w132d-dtb
          path: rk3528-w132d.dtb

      - name: Upload preprocessed DTS (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dts-debug
          path: rk3528-w132d.preprocessed.dts
