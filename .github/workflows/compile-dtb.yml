name: Compile W132D DTB Only

on:
  workflow_dispatch:

jobs:
  build-dtb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu device-tree-compiler

      - name: Verify DTS file and Makefile entry exist
        run: |
          echo "=== DTS file ==="
          ls -la arch/arm64/boot/dts/rockchip/rk3528-w132d.dts
          echo "=== Makefile check ==="
          grep "rk3528-w132d" arch/arm64/boot/dts/rockchip/Makefile || echo "WARNING: Makefile entry missing (not needed for manual compile)"

      - name: Preprocess DTS (resolve #include)
        run: |
          aarch64-linux-gnu-cpp -nostdinc \
            -I include \
            -I arch/arm64/boot/dts/rockchip \
            -undef -x assembler-with-cpp \
            arch/arm64/boot/dts/rockchip/rk3528-w132d.dts \
            rk3528-w132d.preprocessed.dts
          echo "=== Preprocessed DTS size ==="
          wc -l rk3528-w132d.preprocessed.dts

      - name: Compile DTB
        run: |
          dtc -I dts -O dtb -o rk3528-w132d.dtb rk3528-w132d.preprocessed.dts
          echo "=== Output DTB ==="
          ls -la rk3528-w132d.dtb

      - name: Upload DTB
        uses: actions/upload-artifact@v4
        with:
          name: rk3528-w132d-dtb
          path: rk3528-w132d.dtb
